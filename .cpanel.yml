---
# =============================================================
#  cPanel Git Version Control — Deployment config
#  When you click "Update from Remote" + "Deploy HEAD Commit"
#  in cPanel, these tasks run automatically.
#
#  IMPORTANT:
#  - Replace CPANEL_USER with your actual cPanel username
#  - Replace public_html if your WordPress lives in a subfolder
# =============================================================

deployment:
  tasks:
    - export DEPLOY_PATH=/home/CPANEL_USER/public_html
    - export THEME_SRC=$PWD/wp-content/themes/kelarix
    - export THEME_DEST=$DEPLOY_PATH/wp-content/themes/kelarix

    # Ensure destination exists
    - /bin/mkdir -p $THEME_DEST

    # Sync theme files (rsync preserves permissions, removes deleted files)
    - /usr/bin/rsync -av --delete
      --exclude='node_modules'
      --exclude='vendor'
      --exclude='.DS_Store'
      --exclude='Thumbs.db'
      --exclude='*.log'
      $THEME_SRC/ $THEME_DEST/

    # Set safe permissions
    - /bin/chmod -R 755 $THEME_DEST
    - /usr/bin/find $THEME_DEST -type f -exec /bin/chmod 644 {} \;
