---
# =============================================================
#  cPanel Git Version Control — Deployment config
#  Target: kelarix.com (LIVE)
#  Log:    /home/kelarixc/deploy-log.txt
#
#  All tasks run inside ONE bash -c script so:
#    - stdout + stderr both captured to the log
#    - `set -x` traces every command as it runs
#    - `$PWD` = actual cPanel Git repo path (independent of repo name)
#    - a mid-task failure still lets subsequent commands log their errors
# =============================================================
deployment:
  tasks:
    - /bin/bash -c 'exec >/home/kelarixc/deploy-log.txt 2>&1; set -x; echo "=== DEPLOY START $(date) ==="; echo "PWD=$PWD"; ls -la "$PWD/wp-content/themes/kelarix" | head -5; mkdir -p /home/kelarixc/public_html/wp-content/themes/kelarix; rm -rf /home/kelarixc/public_html/wp-content/themes/kelarix/*; cp -Rf "$PWD/wp-content/themes/kelarix/." /home/kelarixc/public_html/wp-content/themes/kelarix/; echo "cp exit: $?"; chmod -R 755 /home/kelarixc/public_html/wp-content/themes/kelarix; find /home/kelarixc/public_html/wp-content/themes/kelarix -type f -exec chmod 644 {} \;; echo "--- Live theme listing ---"; ls -la /home/kelarixc/public_html/wp-content/themes/kelarix/ | head -20; echo "=== DEPLOY END $(date) ==="'
