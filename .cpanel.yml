---
# =============================================================
#  cPanel Git Version Control — Deployment config
#  Each list item under tasks: MUST be a single-line shell command.
#  Absolute paths are used to avoid variable-expansion issues.
# =============================================================
deployment:
  tasks:
    - /bin/mkdir -p /home/kelarixc/public_html/wp-content/themes/kelarix
    - /usr/bin/rsync -av --delete --exclude=".git*" --exclude="node_modules" --exclude=".DS_Store" --exclude="Thumbs.db" /home/kelarixc/repositories/kelarix/wp-content/themes/kelarix/ /home/kelarixc/public_html/wp-content/themes/kelarix/
    - /bin/chmod -R 755 /home/kelarixc/public_html/wp-content/themes/kelarix
    - /usr/bin/find /home/kelarixc/public_html/wp-content/themes/kelarix -type f -exec /bin/chmod 644 {} \;
