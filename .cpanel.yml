---
# =============================================================
#  cPanel Git Version Control — Deployment config
#  Target: kelarix.com (LIVE)
#  Log:    /home/kelarixc/deploy-log.txt
#
#  Every task ends with "; true" so a failing command does NOT
#  abort the remaining tasks (cPanel stops the whole deployment
#  on the first task that returns non-zero). Each step logs its
#  own exit code so we can see exactly where a real failure is.
# =============================================================
deployment:
  tasks:
    - /bin/echo "=== DEPLOY START $(date) ===" > /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/echo "whoami: $(whoami)" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/echo "PWD: $(pwd)" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/echo "--- Source repo listing ---" >> /home/kelarixc/deploy-log.txt 2>&1; /bin/ls -la /home/kelarixc/repositories/kelarix/wp-content/themes/kelarix >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "ls-source exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/mkdir -p /home/kelarixc/public_html/wp-content/themes/kelarix >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "mkdir exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/rm -rf /home/kelarixc/public_html/wp-content/themes/kelarix/* >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "rm exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/cp -Rf /home/kelarixc/repositories/kelarix/wp-content/themes/kelarix/. /home/kelarixc/public_html/wp-content/themes/kelarix/ >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "cp exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/chmod -R 755 /home/kelarixc/public_html/wp-content/themes/kelarix >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "chmod exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /usr/bin/find /home/kelarixc/public_html/wp-content/themes/kelarix -type f -exec /bin/chmod 644 {} \; >> /home/kelarixc/deploy-log.txt 2>&1; /bin/echo "find exit=$?" >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/echo "--- Live theme listing AFTER deploy ---" >> /home/kelarixc/deploy-log.txt 2>&1; /bin/ls -la /home/kelarixc/public_html/wp-content/themes/kelarix/ >> /home/kelarixc/deploy-log.txt 2>&1; true
    - /bin/echo "=== DEPLOY END $(date) ===" >> /home/kelarixc/deploy-log.txt 2>&1; true
