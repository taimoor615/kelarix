<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9b6d6"/>
      <stop offset="0.5" stop-color="#8497c2"/>
      <stop offset="1" stop-color="#5a6fa3"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4f86"/>
      <stop offset="1" stop-color="#1b2a55"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a5f96"/>
      <stop offset="1" stop-color="#27396b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <!-- soft clouds -->
  <g fill="#ffffff" opacity="0.5">
    <ellipse cx="300" cy="160" rx="260" ry="70"/>
    <ellipse cx="620" cy="120" rx="200" ry="55"/>
    <ellipse cx="180" cy="300" rx="220" ry="60"/>
  </g>
  <!-- right-side glass building -->
  <g>
    <polygon points="980,1000 980,330 1380,210 1380,1000" fill="url(#glass)"/>
    <polygon points="1380,1000 1380,210 1600,150 1600,1000" fill="url(#glass2)"/>
    <!-- window grid -->
    <g stroke="#5a6ea6" stroke-width="2" opacity="0.5">
      <line x1="1040" y1="360" x2="1040" y2="1000"/>
      <line x1="1110" y1="350" x2="1110" y2="1000"/>
      <line x1="1180" y1="330" x2="1180" y2="1000"/>
      <line x1="1250" y1="315" x2="1250" y2="1000"/>
      <line x1="1320" y1="295" x2="1320" y2="1000"/>
      <line x1="1440" y1="220" x2="1440" y2="1000"/>
      <line x1="1520" y1="190" x2="1520" y2="1000"/>
    </g>
    <g stroke="#5a6ea6" stroke-width="2" opacity="0.35">
      <line x1="980" y1="430" x2="1600" y2="360"/>
      <line x1="980" y1="540" x2="1600" y2="480"/>
      <line x1="980" y1="650" x2="1600" y2="600"/>
      <line x1="980" y1="760" x2="1600" y2="720"/>
      <line x1="980" y1="870" x2="1600" y2="840"/>
    </g>
  </g>
  <!-- faint left tower -->
  <polygon points="120,1000 120,560 360,520 360,1000" fill="#7e90c0" opacity="0.35"/>
</svg>
